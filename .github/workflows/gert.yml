name: gert-visual

on:
  push:
  workflow_dispatch:

jobs:

  run:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: install
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg
        pip install numpy matplotlib

    - name: run simulation
      run: |
        python gert_visual_simple.py

    - name: upload results
      uses: actions/upload-artifact@v4
      with:
        name: gert-visuals
        path: output
